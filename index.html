        p { font-size: 1.1rem; color: #555; line-height: 1.6; margin-bottom: 30px; }
        .btn { display: inline-block; background-color: #0066cc; color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1rem; transition: background 0.2s; }

    </style>

    <header>
