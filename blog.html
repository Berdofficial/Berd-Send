                    titleText = art.titleHt;
                    descText = art.descHt;
                    fullText = art.fullHt;
                } else if (lang === 'pt') {
                    dateText = art.datePt;
                    titleText = art.titlePt;
                    descText = art.descPt;
                    fullText = art.fullPt;
                }

                const card = document.createElement('div');
                card.className = 'article-card';
                card.innerHTML = `
                    <div class="article-date">${dateText}</div>
                    <h2>${titleText}</h2>
                    <p>${descText}</p>
                    <div id="artFull-${art.id}" class="article-full-content">${fullText}</div>
                    <a onclick="toggleArticle(${art.id})" class="read-more" id="readBtn-${art.id}">${t.readMore}</a>
                `;
                container.appendChild(card);
            });
        }

        function changeLanguage(lang) {
            localStorage.setItem('berdSendLang', lang);
            const t = translations[lang];
            if (!t) return;

            document.getElementById('pageTitle').innerText = t.title;
            renderArticles(lang);

            document.getElementById('menuHome').innerText = t.menuHome;
            document.getElementById('menuBlog').innerText = t.menuBlog;
            document.getElementById('menuPrivacy').innerText = t.menuPrivacy;
            document.getElementById('menuTerms').innerText = t.menuTerms;
            document.getElementById('menuAbout').innerText = t.menuAbout;
            document.getElementById('menuContact').innerText = t.menuContact;
            document.getElementById('menuFaq').innerText = t.menuFaq;
            document.getElementById('menuTracking').innerText = t.menuTracking;
        }

        function toggleArticle(id) {
            var lang = localStorage.getItem('berdSendLang') || 'en';
            var t = translations[lang];
            var fullDiv = document.getElementById('artFull-' + id);
            var btn = document.getElementById('readBtn-' + id);

            if (fullDiv.style.display === "block") {
                fullDiv.style.display = "none";
                btn.innerText = t.readMore;
            } else {
                fullDiv.style.display = "block";
                btn.innerText = t.readLess;
            }
        }

        function toggleMenu() {
            var menu = document.getElementById("myDropdown");
            menu.style.display = (menu.style.display === "block") ? "none" : "block";
        }

        window.onload = function() {
            var savedLang = localStorage.getItem('berdSendLang') || 'en';
            document.getElementById('langSwitch').value = savedLang;
            changeLanguage(savedLang);
        };
    </script>
</body>
</html>
